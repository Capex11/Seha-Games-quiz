<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seha Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container" id="gameContainer">
        <!-- Meter Container -->
        <div id="meterContainer" class="meter-container">
            <div id="meterFill" class="meter-fill"></div>
        </div>

        <!-- Invisible clickable buttons -->
        <button class="quiz-btn" id="btn1" aria-label="Option 1"></button>
        <button class="quiz-btn" id="btn2" aria-label="Option 2"></button>
        <button class="quiz-btn" id="btn3" aria-label="Option 3"></button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
